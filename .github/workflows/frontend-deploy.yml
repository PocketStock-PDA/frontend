name: Frontend Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy static frontend
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_CORE_API_URL: ${{ vars.NEXT_PUBLIC_CORE_API_URL }}
      NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
      NEXT_PUBLIC_APP_ENV: ${{ vars.NEXT_PUBLIC_APP_ENV || 'production' }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate deployment configuration
        shell: bash
        run: |
          required=(
            AWS_ROLE_ARN
            AWS_REGION
            FRONTEND_S3_BUCKET
            CLOUDFRONT_DISTRIBUTION_ID
            NEXT_PUBLIC_API_URL
            NEXT_PUBLIC_WS_URL
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is required for frontend deployment"
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: aws s3 sync out/ "s3://${FRONTEND_S3_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          {
            echo "### Frontend deployment"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- S3 bucket: ${FRONTEND_S3_BUCKET}"
            echo "- CloudFront distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
            echo "- API URL: ${NEXT_PUBLIC_API_URL}"
            echo "- WS URL: ${NEXT_PUBLIC_WS_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
